<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 2</title>
</head>

<style>
    body{
        background-image: url('sunny.png');
        background-repeat: no-repeat;
        background-size: cover;
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;

    }
</style>

<body>
    <center>
    <div class="container" style="width: 800px; height: 400px; background-color: rgb(255, 248, 222); ; margin-top: 200px; border-radius: 20px;">
<h1 style="padding-top: 30px; color: rgb(226, 137, 3);">Heat Index Checker 🥵</h1>
<details>
    <summary style="color: rgb(150, 150, 150); text-align: center;">
        <i>How to Use</i>
    </summary>

    <p style="text-align: center; color:rgb(120, 84, 31);">
        Please input the temperature and humidity to check the Heat Index and its status! 🌞 
    </p>
</details>

<br>

  <form onsubmit="event.preventDefault(); calculateHeatIndex();">
                
                <div class="col">
                <label style="font-size: 20px; color: rgb(226, 137, 3);">Degree in °C</label>
                <input type="number" id="temperature" class="form-control" placeholder="Put temperature value here...">

                <br>

                <label style="font-size: 20px; color: rgb(226, 137, 3);">Humidity in %</label>
                <input type="number" id="humidity" class="form-control" placeholder="Put percentage value here...">

                <br>

                <button type="submit" class="btn btn-warning">Check</button>

</form>

</div>

</center>

<script>
function calculateHeatIndex(){

let temperature, humidity, heatIndex, status;

temperature = parseFloat(document.getElementById("temperature").value);
humidity = parseFloat(document.getElementById("humidity").value);

heatIndex = temperature + (0.33 * humidity) - 4;

switch (true){

case (heatIndex <= 27):
    status = "This is a comfortable and cool temperature.";
    break;

case (heatIndex <= 32):
    status = "This is a warm temperature.";
    break;

case (heatIndex <= 37):
    status = "Be careful! This is a hot temperature.";
    break;

case (heatIndex <= 41):
    status = "Take caution! This temperature is very hot.";
    break;

case (heatIndex >= 42):
    status = "AHHH! This temperature is extreme heat / danger.";
    break;

default:
    status = "Please double check values.";
}

alert("Heat Index: " + heatIndex.toFixed(1) + "°C\nStatus: " + status);
}
</script>
</div>
</body>
</html>
